<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <!-- Flight path arc -->
  <path d="M12 50 Q36 42 52 18"
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3"
        stroke-linecap="round"/>
  <!-- Start dot -->
  <circle cx="12" cy="50" r="3.5" fill="white" fill-opacity="0.8"/>
  <!-- End dot -->
  <circle cx="52" cy="18" r="3.5" fill="white" fill-opacity="0.8"/>
  <!-- Airplane (larger, centered along path) -->
  <g transform="translate(34,30) rotate(-40)">
    <path d="M0,-12 L4,-4 L12,0 L4,2 L3,8 L0,4 L-3,8 L-4,2 L-12,0 L-4,-4 Z"
          fill="white"/>
  </g>
</svg>
